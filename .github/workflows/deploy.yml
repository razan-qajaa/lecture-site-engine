name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          # Caches are immutable. A permanent key kept restoring the original
          # stale dist forever, so untouched subjects could lose newer
          # lectures on the next incremental deploy.
          key: dist-site-v4-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dist-site-v4-

      - name: Smoke test
        run: npm test

      - name: Build changed and missing subjects
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.GITHUB_OAUTH_CLIENT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy — build all subjects with lectures."
            node build/deploy-build.mjs --all
          else
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              echo "First push or unknown before — build all subjects with lectures."
              node build/deploy-build.mjs --all
            else
              node build/detect-changed-subjects.mjs --range "${BEFORE}..${SHA}" | node build/deploy-build.mjs
            fi
          fi

      - name: Verify dist before upload
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing — refusing to deploy."; exit 1; }
          echo "dist/ contents:"
          find dist -maxdepth 3 -type f | head -40

      - name: Save dist cache
        uses: actions/cache/save@v4
        with:
          path: dist
          key: dist-site-v4-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
