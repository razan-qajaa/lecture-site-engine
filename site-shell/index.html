<!DOCTYPE html>
<html lang="ar" dir="rtl" data-storage-prefix="study-guide">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="site-build-id" content="">
  <title>Study Guide</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljsTheme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script>
    (function () {
      try {
        var prefix = document.documentElement.getAttribute("data-storage-prefix") || "study-guide";
        var saved = localStorage.getItem(prefix + "-theme");
        var dark = saved ? saved === "dark" : true;
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      } catch {
        document.documentElement.classList.toggle("dark", true);
        document.documentElement.style.colorScheme = "dark";
      }
    })();
  </script>
  <link rel="stylesheet" href="themes/tokens-base.css">
  <link id="siteTheme" rel="stylesheet" href="themes/amber-default.css">
  <script src="css/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;
        t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];
        y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xim6tigbcd");
    </script>
</head>
<body class="bg-background text-on-surface scroll-smooth">
    <header class="site-navbar bg-surface border-b border-outline-variant w-full px-md md:px-lg sticky top-0 z-50">
      <div class="site-navbar__brand">
        <button type="button" id="backToHubBtn" class="site-navbar__back md:hidden shrink-0 p-base rounded-full hover:bg-surface-variant transition-all" aria-label="العودة للسنوات الدراسية">
          <span class="material-symbols-outlined text-primary">home</span>
        </button>
        <button type="button" id="backToHomeBtn" class="site-navbar__back hidden shrink-0 p-base rounded-full hover:bg-surface-variant transition-all" aria-label="العودة للمحاضرات">
          <span class="material-symbols-outlined text-primary">arrow_forward</span>
      </button>
        <button type="button" id="brandBtn" class="site-navbar__brand-btn text-primary dark:text-inverse-primary hover:opacity-80 transition-opacity text-right min-w-0" title="العودة للسنوات الدراسية">
        <span id="appBrandShort" class="md:hidden">موقع تفاعلي</span>
        <span id="appBrand" class="hidden md:inline">Study Guide</span>
      </button>
    </div>
      <nav class="site-navbar__links hidden md:flex items-center gap-sm text-on-surface-variant font-label-md" aria-label="روابط أساسية">
        <a class="site-navbar__link" href="#home">الرئيسية</a>
        <a class="site-navbar__link" href="../../index.html">السنوات الدراسية</a>
      </nav>
      <div class="site-navbar__actions">
        <div class="lecture-width-control hidden" id="lectureWidthControl">
          <button type="button" id="lectureWidthBtn" class="site-navbar__toggle p-base rounded-full hover:bg-surface-variant transition-all" aria-label="عرض المحتوى" aria-haspopup="true" aria-expanded="false" title="عرض المحتوى">
            <span class="material-symbols-outlined text-on-surface-variant" aria-hidden="true">width</span>
          </button>
          <div id="lectureWidthMenu" class="lecture-width-menu hidden" role="menu" aria-label="خيارات العرض"></div>
        </div>
        <button type="button" id="lectureNotesBtn" class="site-navbar__toggle hidden p-base rounded-full hover:bg-surface-variant transition-all" aria-label="ملاحظات المحاضرة" title="ملاحظات">
          <span class="material-symbols-outlined text-on-surface-variant" aria-hidden="true">sticky_note_2</span>
        </button>
        <button type="button" id="laserPointerToggle" class="site-navbar__toggle p-base rounded-full hover:bg-surface-variant transition-all" aria-label="قلم ليزر تفاعلي" aria-pressed="false" title="قلم ليزر تفاعلي">
          <span class="material-symbols-outlined text-on-surface-variant" aria-hidden="true">flare</span>
        </button>
        <button type="button" id="themeToggle" class="site-navbar__toggle p-base rounded-full hover:bg-surface-variant transition-all" aria-label="تبديل الوضع">
          <span class="material-symbols-outlined text-on-surface-variant" id="themeIcon">dark_mode</span>
        </button>
    </div>
  </header>

  <div id="lectureNotesModal" class="lecture-notes-modal hidden" aria-hidden="true">
    <div class="lecture-notes-modal__backdrop" data-close-notes></div>
    <div class="lecture-notes-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="lectureNotesTitle">
      <div class="lecture-notes-modal__head">
        <h2 id="lectureNotesTitle" class="font-headline-sm text-headline-sm text-on-surface">ملاحظات المحاضرة</h2>
        <button type="button" id="lectureNotesClose" class="lecture-notes-modal__close" aria-label="إغلاق الملاحظات">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <textarea id="lectureNotesInput" class="lecture-notes-modal__textarea" placeholder="اكتب ملاحظاتك هنا…" rows="12"></textarea>
      <p class="lecture-notes-modal__hint font-label-md text-on-surface-variant">تُحفظ الملاحظات تلقائياً على هذا الجهاز.</p>
    </div>
  </div>

  <div id="homeView" class="min-h-[calc(100vh-64px)]">
    <div class="max-w-container-max mx-auto px-lg md:px-xl py-xl">
      <section class="text-center mb-xl">
        <h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary dark:text-inverse-primary mb-md" id="homeTitle">Study Guide</h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto" id="homeSubtitle"></p>
        <div class="disclaimers-stack mt-lg max-w-2xl mx-auto">
          <div class="ai-disclaimer" role="note">
            <span class="material-symbols-outlined ai-disclaimer__icon" aria-hidden="true">smart_toy</span>
            <p class="ai-disclaimer__text"><strong>تنبيه:</strong> المحتوى مُولَّد بمساعدة AI. دليل <strong id="aiDisclaimerSubject">المادة</strong> غير مسؤول عن أي نقص أو خطأ.</p>
          </div>
        </div>
      </section>
      <section id="reviewFeatured" class="mb-2xl hidden" aria-label="مراجعة شاملة"></section>
      <div class="flex items-center gap-md mb-lg">
        <span class="material-symbols-outlined text-primary">school</span>
        <h2 class="font-headline-md text-headline-md text-on-surface">المحاضرات</h2>
      </div>
      <div id="lectureGrid" class="grid grid-cols-1 md:grid-cols-2 gap-lg"></div>
    </div>
  </div>

  <div id="lectureView" class="hidden flex" data-width="120" style="--lecture-body-width: 100%; --lecture-main-pad-inline: var(--lecture-pad-md); --lecture-main-max-width: min(100%, 75rem);">
    <aside class="hidden lg:flex flex-col h-[calc(100vh-64px)] w-80 bg-surface-container-low border-l border-outline-variant sticky top-16 overflow-hidden">
      <div id="sidebarCourse" class="p-lg flex flex-col items-center border-b border-outline-variant shrink-0">
        <span class="material-symbols-outlined text-primary scale-150 mb-md" id="sidebarMatIcon">school</span>
        <h3 class="font-headline-sm text-headline-sm text-primary text-center" id="sidebarCourseTitle">...</h3>
        <p class="font-label-md text-label-md text-on-surface-variant text-center" id="sidebarCourseSub">...</p>
      </div>
      <nav id="sidebarToc" class="flex-1 py-md overflow-y-auto"></nav>
      <div class="p-lg border-t border-outline-variant shrink-0">
        <button type="button" id="jumpQuizBtn" class="w-full bg-primary text-on-primary py-md rounded-lg font-bold hover:opacity-90 transition-all font-label-md">الملخص المنظم</button>
      </div>
    </aside>
    <main class="flex-1 w-full lecture-main">
      <div id="content"></div>
    </main>
  </div>

  <div id="mobileTocBackdrop" class="mobile-toc-backdrop hidden" aria-hidden="true"></div>
  <aside id="mobileTocDrawer" class="mobile-toc-drawer hidden" aria-hidden="true" aria-label="فهرس المحاضرة">
    <div class="mobile-toc-drawer__head">
      <h2 class="font-headline-sm text-headline-sm text-primary">فهرس المحاضرة</h2>
      <button type="button" id="mobileTocClose" class="mobile-toc-drawer__close" aria-label="إغلاق الفهرس">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="mobileTocCourse" class="mobile-toc-drawer__course">
      <span class="material-symbols-outlined text-primary" id="mobileTocMatIcon">school</span>
      <div>
        <p class="font-label-md font-bold text-on-surface" id="mobileTocCourseTitle">...</p>
        <p class="font-label-md text-on-surface-variant text-sm" id="mobileTocCourseSub"></p>
      </div>
    </div>
    <nav id="mobileTocNav" class="mobile-toc-drawer__nav"></nav>
    <div class="mobile-toc-drawer__foot">
      <button type="button" id="mobileJumpQuizBtn" class="w-full bg-primary text-on-primary py-md rounded-lg font-bold font-label-md">الملخص المنظم</button>
    </div>
  </aside>

  <nav id="mobileStudyBar" class="mobile-study-bar hidden lg:hidden" aria-label="أدوات الدراسة">
    <button type="button" id="mobileTocOpen" class="mobile-study-bar__btn">
      <span class="material-symbols-outlined">menu_book</span>
      <span>الفهرس</span>
    </button>
    <button type="button" id="mobileStudyQuizBtn" class="mobile-study-bar__btn">
      <span class="material-symbols-outlined">summarize</span>
      <span>الملخص</span>
    </button>
    <button type="button" id="mobileScrollTopBtn" class="mobile-study-bar__btn">
      <span class="material-symbols-outlined">keyboard_arrow_up</span>
      <span>أعلى</span>
    </button>
  </nav>

  <footer class="bg-surface-container w-full py-lg border-t border-outline-variant">
    <div class="flex flex-col md:flex-row justify-between items-center px-lg gap-md max-w-container-max mx-auto">
      <span class="font-label-md text-on-surface-variant">© <span id="siteYear">2025-2026</span> — <span id="siteSubject">المادة</span> — المكتب الأكاديمي</span>
    </div>
  </footer>

  <button type="button" id="scrollTopFab" class="fixed bottom-lg left-lg w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center hover:scale-110 transition-transform z-40 opacity-0 pointer-events-none" aria-label="العودة للأعلى">
    <span class="material-symbols-outlined">keyboard_arrow_up</span>
  </button>

  <canvas id="laserPointerCanvas" class="laser-pointer-canvas" aria-hidden="true"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/kotlin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
