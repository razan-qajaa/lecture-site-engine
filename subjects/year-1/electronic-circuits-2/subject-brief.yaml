schema_version: "1.0"

subject:
  id: electronic-circuits-2
  name_ar: "الدارات الإلكترونية 2"
  name_en: "Electronic Circuits 2"
  tagline: "BJT MOSFET Solar Power Batteries"
  section_label: "القسم النظري"

locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: none
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

domain: mixed

domain_profile:
  content_types:
    - theory
    - diagrams
    - tables
    - equations
    - pseudocode
  forbid_adding: ["Java", "Python", "C++"]
  prerequisites: ["أساسيات التيار المستمر", "قانون أوم وقوانين كيرشوف", "مبادئ الديودات"]

lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

parts:

  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 18
    min_count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: true
    distribution:
      comparisons: 20
      code_scenario: 35
      application: 35
      algorithm_trace: 10

  debug:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصحيح الكود"
    count: 5
    cover: [logic, misconception, return_check, dead_code]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 4
    count_max: 7
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 3
    count_max: 6
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 3
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 1
    types:
      - er_diagram
      - uml_design
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 10

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 14

  reference_code:
    enabled: false
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: true
    same_program_only: true
    languages: []
    note: ""

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: false
    languages: []
    require_line_explain: false

  line_explain:
    enabled: false
    format: numbered_list

  imports:
    enabled: false

  expected_output:
    enabled: false

  troubleshooting:
    enabled: false

  diagrams:
    enabled: true
    types: [flowchart, circuit-schematic]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false
    types: [usecase, class, activity, flowchart]

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: false

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: false

  images_note:
    enabled: false

  qa_inline:
    enabled: false

  analogy:
    enabled: true

  trade_off:
    enabled: false

  before_after:
    enabled: false

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols: ["V_BE", "V_CE", "V_GS", "V_DS", "I_C", "I_D", "β", "α", "g_m", "r_π"]

pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - id: bjt_basics
      match: "BJT Basics"
      tools: ["NPN/PNP", "β (Beta)", "α (Alpha)", "I_C = β I_B", "V_BE = 0.7 V"]
    - match: "BJT Configurations"
      tools: ["Common Emitter", "Common Base", "Common Collector", "Load Line", "Q-point"]
    - match: "MOSFET Basics"
      tools: ["NMOS/PMOS", "V_t (Threshold)", "V_GS", "V_DS", "Triode Region", "Saturation Region"]

assessment:
  mcq_option_letters: arabic

automation_question_types:

  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 14
    parts: [qa_cards, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
    examples:
      - "ما الفرق بين ترانزستور NPN و PNP؟"
      - "متى نستخدم تشكيلة الباعث المشترك؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, theory]
    blocks: [diagrams, tables, equations, trace]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: دارة، جدول، أو مسألة رياضية كاملة]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو**:
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
    scenario_sources:
      - circuit_analysis
      - numerical_case
      - algorithm_state

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 5
    parts: [exercise, analysis_exercise]
    blocks: [fill_gaps, algorithm, expected_output, tables]
    types:
      - fill_gaps
      - table_fill
      - numerical_solve
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**

  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 3
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
    trace_targets:
      - algorithm_iterations
      - variable_state
      - search_tree_expansion

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory]
    blocks: [compare, trade_off, tables]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |

  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (في دارة أو تحليل)"
    difficulty: hard
    count_min: 4
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, off_by_one, wrong_formula]
    format: |
      **الدارة/التحليل (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)

  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 10
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …

output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥16 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥10 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول ناقص + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "مراجعة سريعة: ≥14 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥3 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥5 تمارين مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥3 جداول ناقصة + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥4 أسئلة مقارنة (compare_analyze)"
    - "اكتشف الخطأ: ≥4 أسئلة تصحيح (find_the_bug)"
    - "نظري منظم: ≥10 أسئلة بهيكل ثابت (structured_theory)"