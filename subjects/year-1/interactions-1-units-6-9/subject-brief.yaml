# ═══════════════════════════════════════════════════════════════════════════════
# Subject Brief — Interactions 1: Reading and Writing (Units 6–9)
# ═══════════════════════════════════════════════════════════════════════════════

schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: interactions-1-units-6-9
  name_ar: "إنتراكتشنز 1: القراءة والكتابة (الوحدات 6–9)"
  name_en: "Interactions 1: Reading and Writing (Units 6–9)"
  tagline: "ثقافة + صحة + إعلام + حياة اجتماعية"
  section_label: "القسم النظري والعملي"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true          # true → wrap every English term: `culture`
  inline_code_comments: none        # لا يوجد كود برمجي
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
# المادة لغوية (قراءة وكتابة) وليست برمجية أو تحليلية تقنية.
domain: theory

domain_profile:
  content_types:
    - theory                        # تعريفات، مبادئ، مفاهيم
    - tables                        # جداول مقارنة، جداول مفردات
    - pseudocode                    # خطوات منظمة (مثل خطوات كتابة فقرة)
  forbid_adding:
    - Java
    - Python
    - C++
    - SQL
    - XML
  prerequisites:
    - "مستوى متوسط في اللغة الإنجليزية (B1/B2)"

# ─── Lecture heading — must match guide-config.js ────────────────────────────
lecture:
  unit_label: "الوحدة"
  split_regex: "^# (الوحدة|Unit) "      # [HUMAN ONLY]
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
# تفعيل الأجزاء التي تخدم مادة اللغة (قراءة نصوص، كتابة، مفردات، تمارين)
parts:

  integration_map:
    enabled: false                  # غير ضروري للمادة

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 16
    min_count: 14
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 40                # مقارنات ثقافية ومفاهيم
      code_scenario: 0               # لا يوجد كود
      application: 40                # تطبيق المفاهيم على نصوص جديدة
      algorithm_trace: 0             # لا يوجد خوارزميات
      # نضيف توزيعاً بديلاً للمادة اللغوية:
      reading_comprehension: 20     # فهم النص

  debug:
    enabled: false

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 4
    count_max: 7
    authored_by_guide: true
    types:
      - fill_gaps
      - scenario
      - code_fix                    # تصحيح جمل أو نصوص (ليس كود برمجي)

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 3
    count_max: 6
    types:
      - case_study
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: false                  # لا يوجد تتبع تنفيذ برمجي

  design_question:
    enabled: false

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 8

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 12

  reference_code:
    enabled: false

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
# تفعيل الكتل المناسبة لمادة اللغة (نصوص، جداول، مقارنات، تشبيهات)
blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: false

  line_explain:
    enabled: false

  imports:
    enabled: false

  expected_output:
    enabled: false

  troubleshooting:
    enabled: false

  diagrams:
    enabled: false

  uml:
    enabled: false

  screen_description:
    enabled: false

  algorithm:
    enabled: false                  # لا توجد خوارزميات برمجية

  structured_english:
    enabled: true                   # خطوات الكتابة والتحليل منظمة

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true                   # تصحيح الجمل أو ترتيب الفقرات

  images_note:
    enabled: true                   # توجد صور في النصوص (توضيحية)

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true                   # تتبع الأفكار والخطوات

  equations:
    enabled: false

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: false      # لا حاجة لتفرع حسب النوع

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── أنواع أسئلة الأتمتة ─────────────────────────────────────────────────────
# تفعيل الأنواع التي تخدم مادة اللغة (قراءة، كتابة، مفردات، مقارنات)
automation_question_types:

  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 12
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين `culture` بمعنى الفنون و`culture` بمعنى العادات؟"
      - "ما معنى `longevity` في سياق الصحة؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (نص + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, theory]
    blocks: [original_quote, tables, compare]
    format: |
      ### السيناريو {N}: {عنوان النص}
      > [فقرة أو فقرتين من النص الأصلي – 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس النص**:
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
      كل سيناريو يختبر: فهم النص + استنتاج + تطبيق المفاهيم.
    scenario_sources:
      - text_comprehension
      - inference
      - vocabulary_in_context
    examples:
      - "نص عن الصحة في الجبال – أي فكرة تدعمها الفقرة؟"

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / اكتب)"
    difficulty: medium
    count_min: 5
    parts: [exercise, analysis_exercise]
    blocks: [fill_gaps, code_fix, tables]
    types:
      - fill_gaps           # ملء الفراغات في جملة أو نص
      - code_fix            # ترتيب جمل أو تصحيح أخطاء لغوية
      - table_fill          # إكمال جدول مقارنة أو مفردات
      - written_analysis    # كتابة فقرة قصيرة
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بجملة/فقرة/جدول – الإجابة قابلة للمقارنة حرفياً أو بالمحتوى.

  step_trace:
    enabled: false                  # لا يوجد تتبع تنفيذ برمجي

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في السياق X، يفضل استخدام Y لأن Z»

  find_the_bug:
    enabled: false                  # لا يوجد كود برمجي

  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 8
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الخصائص: …
      3. مثال من النص: …
      4. متى نستخدم/نلاحظ: …
      — هيكل ثابت يسهّل التصحيح الآلي بالكلمات المفتاحية.

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥16 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥8 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "مراجعة سريعة: ≥12 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥3 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥5 تمارين مع نموذج حل (hands_on)"
    - "مقارنة وتحليل: ≥4 أسئلة مقارنة (compare_analyze)"
    - "نظري منظم: ≥8 أسئلة بهيكل ثابت (structured_theory)"