# ═══════════════════════════════════════════════════════════════════════════════
# Subject Brief — Advanced Programming 2 (Python)
# ═══════════════════════════════════════════════════════════════════════════════
schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: advanced-programming-2
  name_ar: "البرمجة المتقدمة 2"
  name_en: "Advanced Programming 2"
  tagline: "Python Data Science Machine Learning Games"
  section_label: "القسم النظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
domain: mixed

domain_profile:
  content_types:
    - theory
    - code
    - diagrams
    - commands
    - tables
    - pseudocode
    - equations
  forbid_adding: []
  prerequisites:
    - "أساسيات البرمجة (متغيرات، دوال، حلقات)"
    - "مفاهيم البرمجة الكائنية (Classes, Objects)"

# ─── Lecture heading ──────────────────────────────────────────────────────────
lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
parts:

  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 16
    min_count: 14
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 20
      code_scenario: 35
      application: 30
      algorithm_trace: 15

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح الكود"
    count: 5
    cover: [logic, misconception, return_check, dead_code, syntax]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 5
    count_max: 8
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 4
    count_max: 7
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 3
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 2
    types:
      - er_diagram
      - uml_design
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 10

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 15

  reference_code:
    enabled: false
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: false
    same_program_only: false
    languages: []
    note: ""

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: true
    languages: [python, sql, bash, json, csv, html]
    require_line_explain: true

  line_explain:
    enabled: true
    format: numbered_list

  imports:
    enabled: true

  expected_output:
    enabled: true

  troubleshooting:
    enabled: true

  diagrams:
    enabled: true
    types: [flowchart, bpmn, decision-tree, dfd, uml]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: true
    types: [usecase, class, activity, sequence, flowchart]

  screen_description:
    enabled: true

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: true

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols:
      - "Mean (μ)"
      - "Standard Deviation (σ)"
      - "Variance (σ²)"
      - "Correlation (ρ)"
      - "Covariance"
      - "Skewness (g₁)"
      - "Confidence Interval (CI)"
      - "p-value"
      - "MSE (Mean Squared Error)"

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true
  lecture_types:
    - match: "Python Basics"
      tools: ["variables", "lists", "dicts", "tuples", "if/else", "loops", "functions"]
    - match: "OOP in Python"
      tools: ["classes", "inheritance", "super()", "method overriding", "encapsulation"]
    - match: "Data Analysis"
      tools: ["pandas", "DataFrame", "groupby", "pivot_table", "filtering", "sorting"]
    - match: "Data Visualization"
      tools: ["matplotlib", "seaborn", "histogram", "scatter", "bar chart", "pie chart", "heatmap"]
    - match: "Statistical Inference"
      tools: ["mean", "median", "std", "confidence interval", "p-value", "bootstrap", "hypothesis testing"]
    - match: "Machine Learning"
      tools: ["linear regression", "OLS", "scikit-learn", "LogisticRegression", "SVM", "KNN"]
    - match: "Game Development"
      tools: ["pygame", "Sprite", "event loop", "collision detection", "keyboard events"]
    - match: "Web Development"
      tools: ["django", "models", "migrations", "admin site", "URL patterns", "views", "templates"]

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── Types of Automated Questions ────────────────────────────────────────────
automation_question_types:

  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 12
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين `list` و `tuple` في بايثون؟"
      - "متى نستخدم `defaultdict` بدلاً من `dict` العادي؟"
      - "ما الفرق بين `covariance` و `correlation`؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: كود، جدول، مخطط، أو مسألة رياضية كاملة — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو** (لا تكرر نفس الفكرة):
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
      كل سيناريو يختبر: فهم + تطبيق + قرار (أي خطوة تالية؟ أي ناتج؟ أين الخطأ؟)
    scenario_sources:
      - code_trace
      - numerical_case
      - algorithm_state
      - logic_entailment
      - system_design
    examples:
      - "كود بايثون مع `defaultdict` — ما الذي سيُطبع بعد التنفيذ؟"
      - "جدول إحصائي ناقص لمجموعة بيانات Adult — أي قيمة في الخلية X؟"
      - "تحليل انحدار خطي على بيانات `tips` — أي معامل ذو دلالة إحصائية؟"

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 5
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - fill_gaps
      - code_fix
      - table_fill
      - numerical_solve
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بقيمة/جدول/كود — الإجابة قابلة للمقارنة حرفياً أو رقمياً.
    examples:
      - "أكمل كود بايثون لحساب الانحدار الخطي من الصفر"
      - "صحّح الكود التالي الذي يحتوي على خطأ في التعامل مع `DataFrame`"

  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 3
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع (ماذا في الخطوة 3؟)
    trace_targets:
      - algorithm_iterations
      - variable_state
      - search_tree_expansion
      - memory_page_replacement
    examples:
      - "تتبع تنفيذ خوارزمية الانحدار الخطي على بيانات الموظفين (6 موظفين)"
      - "تتبع تكرارات `Bootstrap` لتقدير المتوسط من عينة"

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في الحالة X استخدم Y لأن Z»
    examples:
      - "قارن بين `matplotlib` و `seaborn` في توزيع البيانات"
      - "أي من طرق تقدير الانحدار أفضل لهذه البيانات؟ لماذا؟"

  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 4
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, off_by_one, wrong_formula, race_condition, infinite_loop]
    format: |
      **الكود/الحساب (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)
    examples:
      - "كود بايثون يحتوي على خطأ في حساب `covariance` — أين الخطأ؟"
      - "خطأ في صيغة `Pearson's correlation` — صحّحها واشرح السبب"

  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 10
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …
      — هيكل ثابت يسهّل التصحيح الآلي بالكلمات المفتاحية.
    examples:
      - "عرّف `Confidence Interval` واذكر مكوناته ومتى نستخدمه"
      - "عرّف `Skewness` واشرح كيفية حسابه ومعناه للتوزيع الطبيعي"

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    # ── بنود الأتمتة ──
    - "≥16 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥10 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول ناقص + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "أسئلة تصحيح كود/python إن كانت المادة تحتوي خوارزميات"
    # ── أنواع الأتمتة ──
    - "مراجعة سريعة: ≥12 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥3 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥5 تمارين مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥3 جداول ناقصة + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥4 أسئلة مقارنة (compare_analyze)"
    - "اكتشف الخطأ: ≥4 أسئلة تصحيح (find_the_bug)"
    - "نظري منظم: ≥10 أسئلة بهيكل ثابت (structured_theory)"