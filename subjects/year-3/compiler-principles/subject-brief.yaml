schema_version: "1.0"

subject:
  id: compiler-principles
  name_ar: "مبادئ المترجمات"
  name_en: "Compiler Principles"
  tagline: "تحليل · توليد · تحسين · تشغيل"
  section_label: "القسم النظري"

locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

domain: theory

domain_profile:
  content_types:
    - theory
    - diagrams
    - tables
    - pseudocode
    - equations
  forbid_adding:
    - Java
    - Python
    - C++
  prerequisites:
    - "مفاهيم أساسية في اللغات الشكلية (Formal Languages)"
    - "مهارات في التفكير الخوارزمي"

lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

parts:
  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 18
    min_count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 20
      code_scenario: 25
      application: 25
      algorithm_trace: 30   # تتبع بناء الجداول (LR/LL)، اشتقاق الجمل، حساب First/Follow

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح القواعد والاشتقاقات"
    count: 5
    cover: [logic, misconception, ambiguous_grammar, left_recursion, wrong_derivation]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 6
    count_max: 9
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario
      - first_follow_calc         # حساب First/Follow لقواعد معطاة
      - grammar_transform          # إزالة العودية اليسرى / تحديد عامل مشترك

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 5
    count_max: 8
    types:
      - case_study
      - parse_table_construction   # بناء جدول تحليل LL(1)/SLR كامل من قواعد معطاة
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 5
    note: "كل تمرين: مدخل (سلسلة رموز/قواعد) + جدول/شجرة اشتقاق ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 1
    types:
      - er_diagram
      - uml_design
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 10

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 16

  reference_code:
    enabled: false
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: false
    same_program_only: false
    languages: []
    note: ""

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

blocks:
  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: false
    languages: []
    require_line_explain: true

  line_explain:
    enabled: false
    format: numbered_list

  imports:
    enabled: false

  expected_output:
    enabled: false

  troubleshooting:
    enabled: false

  diagrams:
    enabled: true
    types: [flowchart, decision-tree]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false
    types: []

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: true

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols:
      - "First"
      - "Follow"
      - "E → E + T"
      - "S → aSBC"
      - "E ⇒ -E"
      - "LR(0)"
      - "FOLLOW(F)"

pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true
  lecture_types:
    - match: "Lexical Analysis"
      tools: ["Regular Expressions", "DFA", "NFA", "Scanner"]
    - match: "Syntax Analysis"
      tools: ["CFG", "Derivation", "Parse Tree", "Ambiguity"]
    - match: "Parsing"
      tools: ["Top-Down", "Bottom-Up", "LR Parser", "SLR"]
    - match: "Code Generation"
      tools: ["AST", "Stack Machine", "Register Machine", "Optimization"]

assessment:
  mcq_option_letters: arabic

automation_question_types:
  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 16
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين `First` و `Follow`؟"
      - "متى نستخدم `LR Parser` بدل `LL Parser`؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 4
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: قواعد نحوية، جدول تحليل، أو اشتقاق كامل — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو** (لا تكرر نفس الفكرة):
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
      كل سيناريو يختبر: فهم + تطبيق + قرار (أي خطوة تالية؟ أي ناتج؟ أين الخطأ؟)
    scenario_sources:
      - grammar_definition       # قواعد نحوية كاملة يُطلب اشتقاق/تحليل جملة منها
      - parse_table_state        # جدول تحليل LL/LR ناقص
      - lexical_input_string     # سلسلة رموز يُطلب تحليلها معجمياً (Tokens)
      - ast_construction         # بناء شجرة اشتقاق مجردة من تعبير معطى
    examples:
      - "جدول تحليل `LR` ناقص — أي إجراء في الحالة X مع الرمز Y؟"
      - "قواعد نحوية معينة — أي جملة تُولد ومن خلال أي اشتقاق؟"

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 6
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - first_follow_calc
      - grammar_transform
      - table_fill
      - parse_table_construction
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بقيمة/جدول/اشتقاق — الإجابة قابلة للمقارنة حرفياً أو رقمياً.

  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 5
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    format: |
      **المدخل:** {سلسلة رموز أو قواعد نحوية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع (ماذا في الخطوة 3؟)
    trace_targets:
      - parse_stack_trace       # محتوى المكدس عبر خطوات التحليل Bottom-Up
      - lr_table_construction   # بناء جدول LR/SLR خطوة بخطوة
      - derivation_steps        # خطوات الاشتقاق (Leftmost/Rightmost)
      - dfa_nfa_simulation      # محاكاة DFA/NFA على سلسلة مدخلة

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في الحالة X استخدم Y لأن Z»

  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 5
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, ambiguous_grammar, left_recursion, wrong_derivation, wrong_formula]
    format: |
      **القاعدة/الاشتقاق (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)

  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 10
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …
      — هيكل ثابت يسهّل التصحيح الآلي بالكلمات المفتاحية.

output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."
  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥18 سؤال MCQ مع تعليل كامل لكل خيار، ٣٠٪ منها تتبع خوارزميات (First/Follow, LR, اشتقاق)"
    - "≥10 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول/شجرة ناقصة + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "أسئلة تصحيح قواعد/اشتقاقات (عودية يسرى، غموض، اشتقاق خاطئ)"
    - "مراجعة سريعة: ≥16 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥4 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥6 تمارين First/Follow وتحويل قواعد مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥5 جداول ناقصة (مكدس تحليل، جدول LR، اشتقاق) + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥4 أسئلة مقارنة (compare_analyze)"
    - "اكتشف الخطأ: ≥5 أسئلة تصحيح قواعد نحوية (find_the_bug)"
    - "نظري منظم: ≥10 أسئلة بهيكل ثابت (structured_theory)"