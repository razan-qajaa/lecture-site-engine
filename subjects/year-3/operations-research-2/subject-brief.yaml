schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: operations-research-2
  name_ar: "بحوث العمليات 2"
  name_en: "Operations Research 2"
  tagline: "نقل + إسناد + أرتال + ديناميكية"
  section_label: "القسم النظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
domain: analysis                 # لأن المادة تعتمد على الجداول والمعادلات والخوارزميات الرياضية

domain_profile:
  content_types:
    - theory
    - diagrams
    - tables
    - pseudocode
    - equations
  forbid_adding: []
  prerequisites: []

# ─── Lecture heading ──────────────────────────────────────────────────────────
lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
parts:

  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 18
    min_count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 25
      code_scenario: 10          # تطبيق خوارزمي/جدولي
      application: 35
      algorithm_trace: 30        # تتبع خوارزمية (نقل، إسناد، أقرب جار، برمجة ديناميكية)

  debug:
    enabled: false               # لا يوجد كود برمجي حقيقي في المادة

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 5
    count_max: 8
    authored_by_guide: true
    types:
      - fill_gaps
      - scenario

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 4
    count_max: 7
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 4
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل (جداول النقل، خطوات الإسناد، تتبع أقرب جار، جداول البرمجة الديناميكية)"

  design_question:
    enabled: false

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 10

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 15

  reference_code:
    enabled: false

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: false

  line_explain:
    enabled: false

  imports:
    enabled: false

  expected_output:
    enabled: false

  troubleshooting:
    enabled: false

  diagrams:
    enabled: true
    types: [flowchart, decision-tree, dfd]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: false

  images_note:
    enabled: false

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols: ["λ", "µ", "ρ", "Cij", "xij", "Fj(s)"]

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - match: "Transportation"
      tools: ["NW Corner", "Least-Cost", "VAM", "Closed Rings", "Dij"]
    - match: "Assignment"
      tools: ["Hungarian Algorithm", "Cost Matrix", "Zero Assignment", "Dummy Rows/Cols"]
    - match: "Travelling Salesman"
      tools: ["Nearest Neighbour", "Tour Construction", "Distance Matrix"]
    - match: "Queueing Theory"
      tools: ["M/M/1", "Poisson", "Exponential", "ρ", "L", "Lq", "W", "Wq"]
    - match: "Dynamic Programming"
      tools: ["Backward Recursion", "Tabular Method", "Stage", "State", "Decision"]

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── أنواع أسئلة الأتمتة ─────────────────────────────────────────────────────
automation_question_types:

  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 15
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين نموذج النقل المغلق والمفتوح؟"
      - "متى نستخدم طريقة Vogel Approximation Method (VAM)؟"
      - "ما هو معيار الإيقاف في الخوارزمية الهنغارية؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, theory]
    blocks: [trace, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: جدول نقل، مصفوفة إسناد، شبكة مدن، نظام أرتال، أو مسألة برمجة ديناميكية — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو**:
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
    scenario_sources:
      - numerical_case
      - algorithm_state
      - system_design

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 6
    parts: [exercise, analysis_exercise]
    blocks: [fill_gaps, algorithm, tables]
    types:
      - fill_gaps
      - table_fill
      - numerical_solve
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بقيمة/جدول — الإجابة قابلة للمقارنة حرفياً أو رقمياً.

  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 4
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع.
    trace_targets:
      - algorithm_iterations
      - variable_state
      - search_tree_expansion

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في الحالة X استخدم Y لأن Z»

  find_the_bug:
    enabled: false

  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 10
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …
      — هيكل ثابت يسهّل التصحيح الآلي بالكلمات المفتاحية.

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥18 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥10 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول ناقص + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "مراجعة سريعة: ≥15 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥3 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥6 تمارين مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥4 جداول ناقصة + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥4 أسئلة مقارنة (compare_analyze)"
    - "نظري منظم: ≥10 أسئلة بهيكل ثابت (structured_theory)"
    - "المعادلات الرياضية مكتوبة بصيغة LaTeX واضحة"
    - "جميع الخوارزميات مصحوبة بخطوات مرقمة أو مخطط انسيابي"