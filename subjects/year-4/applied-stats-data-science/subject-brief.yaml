# ═══════════════════════════════════════════════════════════════════════════════
# Subject Brief — Applied Statistics for Data Science
# ═══════════════════════════════════════════════════════════════════════════════

schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: applied-stats-data-science
  name_ar: "الاحصاء التطبيقي لعلم البيانات"
  name_en: "Applied Statistics for Data Science"
  tagline: "احصاء تحليل بيانات تعلم"  # إحصاء + تحليل + بيانات + تعلم
  section_label: "القسم النظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
domain: analysis

domain_profile:
  content_types:
    - theory
    - code
    - diagrams
    - commands
    - tables
    - pseudocode
    - equations
  forbid_adding:
    - "Java"
    - "C++"
    - "JavaScript"
    - "HTML"
  prerequisites:
    - "R"
    - "Python"
    - "pandas"
    - "numpy"
    - "scikit-learn"

# ─── Lecture heading ──────────────────────────────────────────────────────────
lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
parts:

  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 20
    min_count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 20
      code_scenario: 25
      application: 35
      algorithm_trace: 20

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح الكود"
    count: 6
    cover: [logic, misconception, wrong_test_choice, wrong_formula]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 6
    count_max: 10
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario
      - hypothesis_test_apply     # اختيار الاختبار الإحصائي المناسب وتطبيقه كاملاً
      - metric_calculation        # حساب p-value، R²، confidence interval يدوياً

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 5
    count_max: 8
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 4
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 1
    types:
      - er_diagram
      - uml_design
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 12

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 15

  reference_code:
    enabled: true
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: true
    same_program_only: false
    languages: ["R", "Python"]
    note: "يُجمّع الكود من أجزاء المحاضرة في ملفين منفصلين: script.R و script.py"

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: true
    languages: ["R", "Python", "bash"]
    require_line_explain: true

  line_explain:
    enabled: true
    format: numbered_list

  imports:
    enabled: true

  expected_output:
    enabled: true

  troubleshooting:
    enabled: true

  diagrams:
    enabled: true
    types: [flowchart, bpmn, decision-tree, dfd]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false
    types: [usecase, class, activity, flowchart]

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 4

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: false

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: both
    require_explanation: true
    common_symbols:
      - "μ (mean)"
      - "σ (standard deviation)"
      - "r (correlation)"
      - "p-value"
      - "R²"
      - "χ²"
      - "λ (lambda)"
      - "β (beta)"

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - match: "Exploratory Data Analysis"
      tools:
        - "summary statistics (mean, median, quantiles)"
        - "boxplots"
        - "histograms"
        - "density plots"
        - "scatterplots"
    - match: "Data and Sampling Distributions"
      tools:
        - "random sampling"
        - "bootstrap"
        - "confidence intervals"
        - "normal distribution"
        - "t-distribution"
        - "binomial distribution"
        - "chi-square"
        - "F-distribution"
        - "Poisson"
        - "exponential"
        - "Weibull"
    - match: "Statistical Experiments and Significance Testing"
      tools:
        - "A/B testing"
        - "null/alternative hypothesis"
        - "resampling"
        - "permutation tests"
        - "p-value"
        - "t-test"
        - "ANOVA"
        - "chi-square test"
        - "multi-arm bandit"
    - match: "Regression and Prediction"
      tools:
        - "simple linear regression"
        - "multiple linear regression"
        - "factor variables"
        - "interaction terms"
        - "polynomial regression"
        - "splines"
        - "GAMs"
    - match: "Classification"
      tools:
        - "Naive Bayes"
        - "discriminant analysis"
        - "logistic regression"
        - "confusion matrix"
        - "ROC/AUC"
        - "imbalanced data strategies"
    - match: "Statistical Machine Learning"
      tools:
        - "K-nearest neighbors"
        - "decision trees"
        - "random forest"
        - "bagging"
        - "boosting"
        - "XGBoost"
    - match: "Unsupervised Learning"
      tools:
        - "PCA"
        - "K-means clustering"
        - "hierarchical clustering"

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── أنواع أسئلة الأتمتة ─────────────────────────────────────────────────────
automation_question_types:

  # ── 1. مراجعة سريعة: سؤال ← جواب ← سؤال ← جواب ─────────────────────────────
  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 15
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين mean و median؟"
      - "متى نستخدم bootstrap بدل التوزيع الطبيعي؟"

  # ── 2. تحدي صعب: سيناريو واحد + عدة أسئلة MCQ عليه ───────────────────────
  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 4
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: كود R/Python، جدول بيانات، أو مسألة إحصائية كاملة — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو**:
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
    scenario_sources:
      - code_trace
      - numerical_case
      - algorithm_state
      - logic_entailment
    examples:
      - "جدول انحدار خطي — أي قيمة p-value صحيحة؟"
      - "شجرة قرار — أي مسار يؤدي إلى التصنيف الصحيح؟"

  # ── 3. تطبيق عملي: الطالب ينفّذ أو يكمل ───────────────────────────────────
  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 6
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - fill_gaps
      - code_fix
      - table_fill
      - numerical_solve
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بقيمة/جدول/كود — الإجابة قابلة للمقارنة حرفياً أو رقمياً.

  # ── 4. تتبع خطوة بخطوة: جدول ناقص + نموذج حل ─────────────────────────────
  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 4
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع.
    trace_targets:
      - bootstrap_resampling_steps   # تتبع عينات bootstrap عبر التكرارات
      - gradient_descent_steps       # تحديث المعاملات في الانحدار
      - decision_tree_split_steps    # اختيار التقسيم عبر Entropy/Gini
      - hypothesis_test_steps        # خطوات اختبار فرضية من H0 حتى القرار

  # ── 5. مقارنة وتحليل: اختر الأفضل / وضّح الفرق ───────────────────────────
  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 5
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في الحالة X استخدم Y لأن Z»

  # ── 6. اكتشف الخطأ: كود/منطق/حساب خاطئ ──────────────────────────────────
  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 4
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, off_by_one, wrong_formula, infinite_loop]
    format: |
      **الكود/الحساب (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)

  # ── 7. نظري منظم: تعريف + مكونات + مثال (قابل للتصحيح الجزئي) ─────────────
  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 12
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …
      — هيكل ثابت يسهّل التصحيح الآلي بالكلمات المفتاحية.

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥20 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥12 سؤال نظري مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول ناقص + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "أسئلة تصحيح كود R/Python واختيار الاختبار الإحصائي المناسب"
    - "مراجعة سريعة: ≥15 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥4 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥6 تمارين مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥4 جداول ناقصة + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥5 أسئلة مقارنة (compare_analyze)"
    - "اكتشف الخطأ: ≥4 أسئلة تصحيح (find_the_bug)"
    - "نظري منظم: ≥12 سؤال بهيكل ثابت (structured_theory)"