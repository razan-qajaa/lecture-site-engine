schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: network-analysis-design
  name_ar: "تحليل وتصميم النظم والشبكات الحاسوبية"
  name_en: "Networks Analysis and Design"
  tagline: "تبديل توجيه توفر تصميم"
  section_label: "قسم النظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
domain: mixed

domain_profile:
  content_types:
    - theory
    - commands
    - diagrams
    - tables
    - pseudocode
  forbid_adding:
    - "Python"
    - "Java"
    - "C++"
  prerequisites:
    - "OSI & TCP/IP models"
    - "IPv4 addressing"
    - "Basic network devices"

# ─── Lecture heading — must match guide-config.js ────────────────────────────
lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
parts:
  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 20
    min_count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: true
    distribution:
      comparisons: 25
      code_scenario: 25
      application: 30
      algorithm_trace: 20

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح الكود"
    count: 4
    cover: [logic, misconception, return_check, dead_code]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 5
    count_max: 8
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 4
    count_max: 6
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 4
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 2
    types:
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 10

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 15

  reference_code:
    enabled: false
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: false
    same_program_only: false
    languages: []
    note: ""

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
blocks:
  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: true
    languages: ["cisco-ios", "bash"]
    require_line_explain: true

  line_explain:
    enabled: true
    format: numbered_list

  imports:
    enabled: false

  expected_output:
    enabled: true

  troubleshooting:
    enabled: true

  diagrams:
    enabled: true
    types: [flowchart, decision-tree]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 5

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: true

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols:
      - "Cost"
      - "Priority"
      - "Bridge ID"
      - "Path Cost"
      - "Root Path Cost"
      - "Hello Time"
      - "Hold Time"
      - "Weight"
      - "Load"

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - match: "Switch / VLAN / Trunk"
      tools:
        - "MAC table (CAM)"
        - "VLAN (Normal/Extended)"
        - "802.1Q tagging"
        - "Native VLAN"
        - "DTP modes (auto/desirable/trunk/access)"
        - "switchport commands"
    - match: "Inter-VLAN routing"
      tools:
        - "Legacy routing"
        - "Router-on-a-stick (subinterfaces)"
        - "SVI"
        - "Routed ports"
    - match: "STP / VTP / EtherChannel"
      tools:
        - "STP states"
        - "Root Bridge election"
        - "BPDU"
        - "PVST+ / Rapid PVST+"
        - "VTP modes (Server/Client/Transparent)"
        - "PAgP / LACP"
        - "PortFast, BPDUguard, RootGuard"
    - match: "High Availability (HSRP / VRRP / GLBP)"
      tools:
        - "First-hop redundancy"
        - "HSRP groups, priority, preemption, tracking"
        - "VRRP master/backup"
        - "GLBP AVG/AVF, load balancing (RR/weighted/host-dependant)"
    - match: "Port Security"
      tools:
        - "Violation modes (protect/restrict/shutdown)"
        - "Sticky MAC"
        - "Error-disabled recovery"

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── Automation Question Types ──────────────────────────────────────────────
automation_question_types:

  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 15
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
    examples:
      - "ما الفرق بين `STP` و `RSTP`؟"
      - "متى نستخدم `SVI` بدل `Routed Port`؟"

  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: كود، جدول، مخطط، أو مسألة رياضية كاملة — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو**:
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
    scenario_sources:
      - code_trace
      - numerical_case
      - algorithm_state
      - system_design
    examples:
      - "جدول MAC Address Table بعد flooding — أي منافذ سترسل إليها الإطارات؟"
      - "سيناريو HSRP مع Active/Standby — ماذا يحدث بعد تعطل Active؟"

  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 6
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - fill_gaps
      - code_fix
      - table_fill
      - numerical_solve
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**

  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 4
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع
    trace_targets:
      - algorithm_iterations
      - variable_state
      - search_tree_expansion

  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 5
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل
      أو جدول: | المعيار | الخيار A | الخيار B |

  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 4
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, off_by_one, wrong_formula]
    format: |
      **الكود/الحساب (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)

  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 10
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥20 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥10 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول ناقص + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "أسئلة تصحيح كود/pseudocode إن كانت المادة تحتوي خوارزميات"
    - "مراجعة سريعة: ≥15 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥3 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥6 تمارين مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥4 جداول ناقصة + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥5 أسئلة مقارنة (compare_analyze)"
    - "اكتشف الخطأ: ≥4 أسئلة تصحيح (find_the_bug)"
    - "نظري منظم: ≥10 أسئلة بهيكل ثابت (structured_theory)"