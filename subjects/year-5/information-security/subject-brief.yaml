# ═══════════════════════════════════════════════════════════════════════════════
# تعليمات للذكاء الاصطناعي (DeepSeek / Claude) — اقرأ قبل التعبئة
# ═══════════════════════════════════════════════════════════════════════════════
#
# مهمتك: املأ هذا القالب وارجع ملف YAML واحد فقط باسم subject-brief.yaml
# لا تشرح، لا تضف markdown، لا تولّد محتوى محاضرات — فقط إعدادات المادة.
#
# المدخلات التي سيرسلها المستخدم:
#   1) هذا القالب (subject-brief.template.yaml)
#   2) النظري الكامل للمادة (كل المحاضرات: PDF أو نص)
#
# ماذا تفعل:
#   - اقرأ كل المحاضرات وافهم: هل فيها أكواد؟ مخططات؟ أوامر CLI؟ جداول؟
#   - فعّل (enabled: true) الأجزاء (parts) والبلوكات (blocks) الموجودة فعلاً في المادة
#   - حاول قدر الإمكان تفعيل **أكبر عدد معقول** من البلوكات والأجزاء المهمّة للمادة —
#     لا تكتفِ بالحد الأدنى: إذا النوع متواجد أو مفيد لهذه المادة فعّله واضبط إعداداته
#   - عطّل (enabled: false) فقط ما لا يظهر أبداً ولا ينطبق على المادة
#   - اضبط count / count_min / count_max للأسئلة حسب حجم المادة
#   - اختر domain الصحيح: programming | analysis | theory | mixed
#   - املأ domain_profile.content_types و forbid_adding حسب اللغات/الأدوات الفعلية
#   - املأ subject (name_ar, name_en, tagline, section_label) من اسم المادة
#   - املأ lecture_types تحت pedagogy إذا adapt_to_lecture_type: true
#   - فعّل reference_code إذا المحاضرة تشرح برنامجاً واحداً على دفعات — يُجمَّع كود كامل في النهاية
#   - فعّل equations للمواد الرياضية (تعقيد، A* f(n), تكامل، إلخ)
#
# ═══ أولوية الأتمتة (الفحص كله أتمتة — هذا الأهم) ═══
#   الهدف: أكبر عدد ممكن من أسئلة/تمارين قابلة للتصحيح الآلي مع نموذج إجابة واضح.
#
#   فعّل دائماً إن أمكن:
#     mcq (≥16) | theory (≥8) | trace_exercise (≥3) | exercise (≥4) |
#     analysis_exercise | qa_cards (≥12) | checklist | fill_gaps | code_fix
#
#   فعّل حسب المادة:
#     programming  → code + debug + reference_code + imports + expected_output
#     analysis     → trace_exercise + table_fill + numerical_solve + equations + algorithm
#     theory/mixed → pseudocode + debug(logic) + algorithm_trace في MCQ + diagrams
#
#   ارفع count/count_min — لا تكتفِ بالحد الأدنى. كل جزء يحتاج نموذج حل كامل.
#   أضف في checklist_items بنوداً تتحقق من وجود كل نوع سؤال مفعّل.
#
#   توزيع MCQ المقترح للأتمتة:
#     comparisons 20–30% | code_scenario/algorithm_trace 30–40% | application 25–40%
#
#   املأ قسم automation_question_types — 6 أنواع جاهزة، فعّل ما يناسب المادة واضبط count_min.
#   كل نوع يربط parts + blocks + صيغة الإخراج — لا تكتفِ بالنظري فقط.
#
# قواعد صارمة:
#   - أبقِ schema_version: "1.0" كما هو
#   - لا تغيّر عناوين heading للأجزاء المفعّلة — الـ parser يعتمد عليها
#   - لا تخترع أجزاء غير موجودة في القالب (انظر القائمة أدناه)
#   - أرجع YAML صالح فقط — بدون ```yaml wrapper
#
# أجزاء المحاضرة (parts) — فعّل ما يناسب المادة فقط:
#   integration_map | detail | summary | mcq | debug | exercise |
#   analysis_exercise | trace_exercise | design_question |
#   qa_cards | reference_code | theory | checklist | cheat_sheet
#
# كتل الشرح (blocks) — فعّل كل ما يظهر أو يهم المادة (لا تقتصد بالتفعيل):
#   original_quote | simplified_explanation | code | line_explain | imports |
#   expected_output | troubleshooting | diagrams | uml | screen_description |
#   algorithm | structured_english | compare | callouts | think_prompt |
#   tables | fill_gaps | code_fix | images_note | qa_inline | analogy |
#   trade_off | before_after | trace | equations
#
# الناتج يُستخدم في الخطوة التالية:
#   subject-brief.yaml + meta-prompt.md → custom_prompt.md → استخراج parN.md من PDF
# ═══════════════════════════════════════════════════════════════════════════════

# Subject Brief Template — Lecture Site Engine v1.0
# Fill this file for your subject, then send it to meta-prompt with SCHEMA.md.
# Fields the AI reads: enabled, heading, count, difficulty, types, languages, format, flags.
# Fields marked [HUMAN ONLY] are for your reference — the AI ignores them.

schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: information-security
  name_ar: "أمن المعلومات"
  name_en: "Information Security"
  tagline: "تشفير + تحكم + برمجيات + سلسلة كتل"
  section_label: "القسم النظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
domain: mixed

domain_profile:
  content_types:
    - theory
    - code
    - diagrams
    - tables
    - pseudocode
    - equations
  forbid_adding: []
  prerequisites: []

# ─── Lecture heading — must match guide-config.js ────────────────────────────
lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
parts:

  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في الدورة؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section:
      - original_quote
      - simplified_explanation

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 18
    min_count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 20
      code_scenario: 35
      application: 30
      algorithm_trace: 15

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح الكود والمنطق"
    count: 5
    cover: [logic, misconception, return_check, dead_code]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 5
    count_max: 8
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario

  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 4
    count_max: 7
    types:
      - case_study
      - diagram_completion
      - table_fill
      - written_analysis

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ"
    count_min: 4
    note: "كل تمرين: مدخل + جدول/شجرة ناقصة للطالب + نموذج الحل الكامل"

  design_question:
    enabled: false
    heading: "الجزء الرابع: أسئلة تصميم"
    count_min: 1
    types:
      - er_diagram
      - uml_design
      - architecture
      - schema_design

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 10

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 15

  reference_code:
    enabled: false
    heading: "الجزء الخامس: كتابة الكود الكامل (مرجع شامل)"
    assemble_from_fragments: true
    same_program_only: true
    languages: []
    note: ""

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: true
    languages: [c, python, sql, kotlin, bash]
    require_line_explain: true

  line_explain:
    enabled: true
    format: numbered_list

  imports:
    enabled: true

  expected_output:
    enabled: true

  troubleshooting:
    enabled: true

  diagrams:
    enabled: true
    types: [flowchart, decision-tree, dfd]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: false
    types: [usecase, class, activity, flowchart]

  screen_description:
    enabled: false

  algorithm:
    enabled: true

  structured_english:
    enabled: true

  compare:
    enabled: true

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: false

  qa_inline:
    enabled: true

  analogy:
    enabled: true

  trade_off:
    enabled: true

  before_after:
    enabled: true

  trace:
    enabled: true

  equations:
    enabled: true
    display_mode: block
    require_explanation: true
    common_symbols: ["C", "P", "K", "n", "φ", "mod", "hash", "XOR", "RSA"]

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - match: "Cryptography"
      tools: ["Encryption/Decryption", "Keys", "Ciphers", "Hash Functions"]
    - match: "Access Control"
      tools: ["Policies", "Models", "Subjects/Objects", "ACLs"]
    - match: "Software Security"
      tools: ["Input Validation", "Memory Safety", "Code Injection", "Fuzzing"]
    - match: "Blockchain"
      tools: ["Distributed Ledger", "Consensus", "Merkle Tree", "Smart Contracts"]
    - match: "Authentication"
      tools: ["Factors", "Passwords", "Biometrics", "Challenge-Response"]
    - match: "Database Security"
      tools: ["Access Control", "Views", "Encryption", "SQL Injection"]

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── أنواع أسئلة الأتمتة ─────────────────────────────────────────────────────

automation_question_types:

  # ── 1. مراجعة سريعة ─────────────────────────────────────────────
  flash_qa:
    enabled: true
    label_ar: "مراجعة سريعة (سؤال / جواب)"
    difficulty: easy
    count_min: 15
    parts: [qa_cards, qa_inline, theory]
    blocks: [qa_inline, callouts]
    format: |
      **Q{N}:** سؤال مراجعة مباشر (تعريف، فرق، متى نستخدم)
      **A:** إجابة مختصرة قابلة للمقارنة الآلية (جملة أو جملتان)
      — بدون تعليل طويل. مناسب للحفظ السريع قبل الامتحان.
    examples:
      - "ما الفرق بين التهديد والثغرة الأمنية؟"
      - "ما هو مبدأ كيرشوف؟"
      - "ما الفرق بين التشفير المتناظر وغير المتناظر؟"

  # ── 2. تحدي مركّب ───────────────────────────────────────────────
  scenario_cluster:
    enabled: true
    label_ar: "تحدي مركّب (سيناريو + أسئلة متعددة)"
    difficulty: hard
    count_min: 3
    questions_per_scenario: 4
    parts: [mcq, debug, theory]
    blocks: [code, trace, diagrams, tables, compare, equations]
    format: |
      ### السيناريو {N}: {عنوان}
      > [وصف الحالة: كود، جدول، مخطط، أو مسألة رياضية كاملة — 5–10 أسطر]
      ثم 3–5 أسئلة MCQ **كلها مبنية على نفس السيناريو** (لا تكرر نفس الفكرة):
      ### السؤال {N}.1 (hard) … أ) ب) ج) د) + تعليل
      كل سيناريو يختبر: فهم + تطبيق + قرار (أي خطوة تالية؟ أي ناتج؟ أين الخطأ؟)
    scenario_sources:
      - code_trace
      - numerical_case
      - algorithm_state
      - logic_entailment
      - system_design
    examples:
      - "تشفير وفك تشفير باستخدام RSA: حساب المفاتيح أو فك تشفير رسالة."
      - "كود خوارزمية تدفق (Stream Cipher) به خطأ في إدارة المفتاح."

  # ── 3. تطبيق عملي ───────────────────────────────────────────────
  hands_on:
    enabled: true
    label_ar: "تطبيق عملي (أكمل / صحّح / نفّذ)"
    difficulty: medium
    count_min: 6
    parts: [exercise, analysis_exercise, debug]
    blocks: [fill_gaps, code_fix, algorithm, expected_output, tables]
    types:
      - fill_gaps
      - code_fix
      - table_fill
      - numerical_solve
      - diagram_completion
    format: |
      كل تمرين: **المعطيات** + **المطلوب** (مرقّم) + **نموذج الحل الكامل**
      الطالب يجيب بقيمة/جدول/كود — الإجابة قابلة للمقارنة حرفياً أو رقمياً.

  # ── 4. تتبع خطوة بخطوة ──────────────────────────────────────────
  step_trace:
    enabled: true
    label_ar: "تتبع خطوة بخطوة (جدول ناقص)"
    difficulty: medium
    count_min: 4
    parts: [trace_exercise, mcq]
    blocks: [trace, algorithm, tables, diagrams]
    format: |
      **المدخل:** {حالة ابتدائية}
      **أكمل الجدول:**
      | الخطوة | العملية | الحالة |
      | 1 | ... | ؟ |
      **نموذج الحل:** جدول مكتمل + **النتيجة النهائية**
      + 1–2 سؤال MCQ على نفس التتبع (ماذا في الخطوة 3؟)
    trace_targets:
      - algorithm_iterations
      - variable_state
      - search_tree_expansion
      - memory_page_replacement

  # ── 5. مقارنة وتحليل ────────────────────────────────────────────
  compare_analyze:
    enabled: true
    label_ar: "مقارنة وتحليل (أيهما أفضل؟ لماذا؟)"
    difficulty: medium
    count_min: 4
    parts: [mcq, theory, analysis_exercise]
    blocks: [compare, trade_off, tables, analogy]
    format: |
      سؤال مقارنة بخيارات (أ، ب، ج، د) + تعليل لماذا الباقي خاطئ
      أو جدول: | المعيار | الخيار A | الخيار B |
      أو تمرين تحليل: «في الحالة X استخدم Y لأن Z»

  # ── 6. اكتشف الخطأ ──────────────────────────────────────────────
  find_the_bug:
    enabled: true
    label_ar: "اكتشف الخطأ (كود / منطق / حساب)"
    difficulty: hard
    count_min: 5
    parts: [debug, exercise]
    blocks: [code_fix, compare, troubleshooting]
    bug_types: [logic, misconception, off_by_one, wrong_formula, race_condition, infinite_loop]
    format: |
      **الكود/الحساب (يحتوي خطأ):** …
      **اكتشف الخطأ:** [وصف موجز]
      **التصحيح:** … + **شرح الحل** (3 نقاط)

  # ── 7. نظري منظم ────────────────────────────────────────────────
  structured_theory:
    enabled: true
    label_ar: "نظري منظم (تعريف + مكونات + مثال)"
    difficulty: medium
    count_min: 10
    parts: [theory, mcq]
    blocks: [compare, tables, callouts]
    format: |
      ### السؤال {N}: {السؤال}
      **نموذج الإجابة:**
      1. التعريف: …
      2. المكونات/الشروط: …
      3. مثال: …
      4. متى نستخدم: …
      — هيكل ثابت يسهّل التصحيح الآلي بالكلمات المفتاحية.

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل معلومة وردت في المحاضرة"
    - "كل قسم يبدأ بـ «النص الأصلي يقول» + «الشرح المبسّط»"
    - "الأقسام مرقّمة هرمياً (1، 1.1، 2 …)"
    - "استخدمت جداول لكل مقارنة وقائمة تعريفات"
    - "كل مصطلح إنجليزي بين backticks"
    - "≥16 سؤال MCQ مع تعليل كامل لكل خيار"
    - "≥10 أسئلة نظرية مع نموذج إجابة منظم"
    - "تمارين تتبع: كل تمرين له جدول ناقص + نموذج حل كامل"
    - "تمارين تطبيقية من إعداد الدليل مع نموذج حل"
    - "أسئلة تصحيح كود/pseudocode إن كانت المادة تحتوي خوارزميات"
    - "مراجعة سريعة: ≥15 بطاقة Q/A (flash_qa)"
    - "تحدي مركّب: ≥3 سيناريوهات × 3–5 أسئلة MCQ لكل سيناريو (scenario_cluster)"
    - "تطبيق عملي: ≥6 تمارين مع نموذج حل (hands_on)"
    - "تتبع خطوة بخطوة: ≥4 جداول ناقصة + نموذج حل (step_trace)"
    - "مقارنة وتحليل: ≥4 أسئلة مقارنة (compare_analyze)"
    - "اكتشف الخطأ: ≥5 أسئلة تصحيح (find_the_bug)"
    - "نظري منظم: ≥10 أسئلة بهيكل ثابت (structured_theory)"